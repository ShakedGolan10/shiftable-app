# Settings for Cloud Run
runConfig:
  minInstances: 2
  maxInstances: 100
  concurrency: 100
  cpu: 2
  memoryMiB: 1024

# Environment variables and secrets
env:
  - variable: NEXT_PRIVATE_JWT_SECRET
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_JWT_SECRET/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_APIKEY
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_APIKEY/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_AUTHDOMAIN
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_AUTHDOMAIN/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_PROJECTID
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_PROJECTID/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_STORAGEBUCKET
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_STORAGEBUCKET/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_MESSAGINGSENDERID
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_MESSAGINGSENDERID/versions/latest
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PRIVATE_FIREBASE_APPID
    secret: projects/shiftable-67b5d/secrets/NEXT_PRIVATE_FIREBASE_APPID/versions/latest
    availability:
      - BUILD
      - RUNTIME
